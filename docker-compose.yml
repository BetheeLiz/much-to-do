services:
 backend:
  build: .

  container_name: muchtodo-backend

  ports:
    - "8080:8080"

  environment:
   MONGO_URI: "mongodb://mongodb:27017/muchtodo"
   DB_NAME: "muchtodo"
   PORT: "8080"

  depends_on:
    - mongodb

  restart: unless-stopped

 mongodb:
  image: mongo:7

  container_name: muchtodo-mongodb

  ports:
    - "27017:27017"

  volumes:
    - mongodb_data:/data/db

  restart: unless-stopped

volumes:
  mongodb_data: